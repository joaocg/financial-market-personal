services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    working_dir: /var/www/html
    volumes:
      - ./laravel:/var/www/html
      - composer_vendor:/var/www/html/vendor
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: host.docker.internal
      DB_PORT: 3306
      DB_DATABASE: joao_financeiro
      DB_USERNAME: root
      DB_PASSWORD: 123456789
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: file
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: null
      WAHA_BASE_URL: http://waha:3000
      WAHA_API_KEY: local-waha-key
      WAHA_WEBHOOK_SECRET: local-waha-webhook-secret
      AUTH_JWT_SECRET: local-jwt-secret
      AI_PROVIDER: ollama
      AI_API_KEY: null
      AI_RECEIPT_CONFIDENCE_THRESHOLD: "0.7"
      AI_RECEIPT_STORAGE_DISK: local
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: gemma4:e4b
      OLLAMA_TIMEOUT: "60"
      OLLAMA_VISION_ENABLED: "true"
      WHATSAPP_AI_ASSISTANT_ENABLED: "false"
      WHATSAPP_AI_ASSISTANT_MINIMUM_CONFIDENCE: "0.78"
      WHATSAPP_AUDIO_TRANSCRIPTION_ENABLED: "false"
      WHATSAPP_AUDIO_TRANSCRIPTION_PROVIDER: "none"
      WHATSAPP_AUDIO_TRANSCRIPTION_COMMAND: ""
      WHATSAPP_AUDIO_TRANSCRIPTION_BASE_URL: http://host.docker.internal:8001
      WHATSAPP_AUDIO_TRANSCRIPTION_ENDPOINT: /v1/audio/transcriptions
      WHATSAPP_AUDIO_TRANSCRIPTION_MODEL: whisper-1
      WHATSAPP_AUDIO_TRANSCRIPTION_LANGUAGE: pt
      WHATSAPP_AUDIO_TRANSCRIPTION_TIMEOUT: "120"
      WHATSAPP_AUDIO_TRANSCRIPTION_API_KEY: ""
      MARKET_GEOCODER_FALLBACK_ENABLED: "true"
      MARKET_GEOCODER_FALLBACK_BASE_URL: http://market-geocoder:8010
      MARKET_GEOCODER_FALLBACK_ENDPOINT: /v1/geocode/lookup
      MARKET_GEOCODER_FALLBACK_TIMEOUT: "20"
      MARKET_GEOCODER_FALLBACK_USER_AGENT: FinanceiroMarket/1.0 (dev@localhost)
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: ["/usr/local/bin/start-app"]
    healthcheck:
      test: ["CMD-SHELL", "php -r '$$r=@file_get_contents(\"http://127.0.0.1:8000/up\"); exit($$r===false?1:0);'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    working_dir: /var/www/html
    volumes:
      - ./laravel:/var/www/html
      - composer_vendor:/var/www/html/vendor
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: host.docker.internal
      DB_PORT: 3306
      DB_DATABASE: joao_financeiro
      DB_USERNAME: root
      DB_PASSWORD: 123456789
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: file
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: null
      WAHA_BASE_URL: http://waha:3000
      WAHA_API_KEY: local-waha-key
      WAHA_WEBHOOK_SECRET: local-waha-webhook-secret
      AUTH_JWT_SECRET: local-jwt-secret
      AI_PROVIDER: ollama
      AI_API_KEY: null
      AI_RECEIPT_CONFIDENCE_THRESHOLD: "0.7"
      AI_RECEIPT_STORAGE_DISK: local
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: gemma4:e4b
      OLLAMA_TIMEOUT: "60"
      OLLAMA_VISION_ENABLED: "true"
      WHATSAPP_AI_ASSISTANT_ENABLED: "false"
      WHATSAPP_AI_ASSISTANT_MINIMUM_CONFIDENCE: "0.78"
      WHATSAPP_AUDIO_TRANSCRIPTION_ENABLED: "false"
      WHATSAPP_AUDIO_TRANSCRIPTION_PROVIDER: "none"
      WHATSAPP_AUDIO_TRANSCRIPTION_COMMAND: ""
      WHATSAPP_AUDIO_TRANSCRIPTION_BASE_URL: http://host.docker.internal:8001
      WHATSAPP_AUDIO_TRANSCRIPTION_ENDPOINT: /v1/audio/transcriptions
      WHATSAPP_AUDIO_TRANSCRIPTION_MODEL: whisper-1
      WHATSAPP_AUDIO_TRANSCRIPTION_LANGUAGE: pt
      WHATSAPP_AUDIO_TRANSCRIPTION_TIMEOUT: "120"
      WHATSAPP_AUDIO_TRANSCRIPTION_API_KEY: ""
      MARKET_GEOCODER_FALLBACK_ENABLED: "true"
      MARKET_GEOCODER_FALLBACK_BASE_URL: http://market-geocoder:8010
      MARKET_GEOCODER_FALLBACK_ENDPOINT: /v1/geocode/lookup
      MARKET_GEOCODER_FALLBACK_TIMEOUT: "20"
      MARKET_GEOCODER_FALLBACK_USER_AGENT: FinanceiroMarket/1.0 (dev@localhost)
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["/usr/local/bin/start-worker"]

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: financeiro
      MYSQL_USER: financeiro
      MYSQL_PASSWORD: financeiro
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  waha:
    # Build locally because the published `devlikeapro/waha:latest`
    # image does not provide a `linux/arm64/v8` manifest.
    build:
      context: ./waha
    image: financeiro-waha:local
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      WAHA_API_KEY: local-waha-key
      WAHA_DASHBOARD_ENABLED: "true"
      WAHA_DASHBOARD_USERNAME: admin
      WAHA_DASHBOARD_PASSWORD: local-waha-admin
      WHATSAPP_SWAGGER_ENABLED: "true"
      WHATSAPP_SWAGGER_USERNAME: admin
      WHATSAPP_SWAGGER_PASSWORD: local-waha-admin
      WHATSAPP_DEFAULT_ENGINE: WEBJS
      WAHA_NAMESPACE: all
      WAHA_BASE_URL: http://waha:3000
      WAHA_LOG_FORMAT: PRETTY
      WAHA_LOG_LEVEL: info
      WAHA_PRINT_QR: "false"
      WHATSAPP_HOOK_URL: http://app:8000/api/v1/webhooks/waha
      WHATSAPP_HOOK_CUSTOM_HEADERS: X-WAHA-Secret:local-waha-webhook-secret
      WHATSAPP_HOOK_EVENTS: message
      WHATSAPP_START_SESSION: default
      WAHA_MEDIA_STORAGE: LOCAL
      WHATSAPP_FILES_FOLDER: /app/.media
    ports:
      - "3000:3000"
    volumes:
      - waha_sessions:/app/.sessions
      - waha_media:/app/.media
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3000/', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  audio-transcriber:
    profiles: ["audio"]
    build:
      context: .
      dockerfile: docker/audio-transcriber/Dockerfile
    environment:
      WHISPER_MODEL_SIZE: small
      WHISPER_DEVICE: cpu
      WHISPER_COMPUTE_TYPE: int8
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/up')\""]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s

  market-geocoder:
    build:
      context: .
      dockerfile: docker/market-geocoder/Dockerfile
    environment:
      MARKET_GEOCODER_USER_AGENT: FinanceiroMarket/1.0 (dev@localhost)
      MARKET_GEOCODER_NOMINATIM_TIMEOUT: "15"
      MARKET_GEOCODER_VIACEP_TIMEOUT: "10"
    ports:
      - "8010:8010"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/up')\""]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  composer_vendor:
  mysql_data:
  redis_data:
  waha_sessions:
  waha_media:
