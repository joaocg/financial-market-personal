services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    working_dir: /var/www/html
    env_file:
      - ./laravel/.env
    environment:
      REDIS_HOST: redis
      MARKET_GEOCODER_FALLBACK_BASE_URL: http://market-geocoder:8010
    volumes:
      - ./laravel:/var/www/html:Z
      - composer_vendor:/var/www/html/vendor:Z
    depends_on:
      - redis
      - market-geocoder
    ports:
      - "127.0.0.1:8000:8000"
    command: ["/usr/local/bin/start-app"]
    healthcheck:
      test: ["CMD-SHELL", "php -r '$$r=@file_get_contents(\"http://127.0.0.1:8000/up\"); exit($$r===false?1:0);'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    working_dir: /var/www/html
    env_file:
      - ./laravel/.env
    environment:
      REDIS_HOST: redis
      MARKET_GEOCODER_FALLBACK_BASE_URL: http://market-geocoder:8010
    volumes:
      - ./laravel:/var/www/html:Z
      - composer_vendor:/var/www/html/vendor:Z
    depends_on:
      - redis
      - market-geocoder
    command: ["/usr/local/bin/start-worker"]
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    working_dir: /var/www/html
    env_file:
      - ./laravel/.env
    environment:
      REDIS_HOST: redis
      MARKET_GEOCODER_FALLBACK_BASE_URL: http://market-geocoder:8010
    volumes:
      - ./laravel:/var/www/html:Z
      - composer_vendor:/var/www/html/vendor:Z
    depends_on:
      - redis
      - market-geocoder
    command: ["/usr/local/bin/start-scheduler"]
    restart: unless-stopped

  redis:
    image: docker.io/library/redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data:Z
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  market-geocoder:
    build:
      context: .
      dockerfile: docker/market-geocoder/Dockerfile
    env_file:
      - ./laravel/.env
    environment:
      MARKET_GEOCODER_USER_AGENT: FinanceiroMarket/1.0
      MARKET_GEOCODER_NOMINATIM_TIMEOUT: "15"
      MARKET_GEOCODER_VIACEP_TIMEOUT: "10"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/up')\""]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

volumes:
  composer_vendor:
  redis_data:
